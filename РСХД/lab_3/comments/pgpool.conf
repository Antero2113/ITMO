# ============================================
# 🌐 СЕТЕВЫЕ НАСТРОЙКИ
# ============================================

listen_addresses = '*'
# '*' - слушаем подключения на всех сетевых интерфейсах
# Можно указать конкретный IP: '192.168.1.100' или 'localhost'

port = 9999
# Порт, на котором Pgpool принимает клиентские подключения (PostgreSQL-протокол)
# 9999 - стандартный порт Pgpool-II (не путать с 5432 PostgreSQL)

socket_dir = '/var/run/postgresql'
# Директория для UNIX-сокетов (локальные подключения без TCP)

pcp_listen_addresses = '*'
# Адреса для PCP-соединений (Pgpool Control Protocol - для администрирования)

pcp_port = 9898
# Порт для PCP-команд (pcp_node_info, pcp_attach_node и т.д.)

pcp_socket_dir = '/var/run/postgresql'
# Директория для UNIX-сокетов PCP

# ============================================
# ⚙️ РЕЖИМ КЛАСТЕРИЗАЦИИ
# ============================================

backend_clustering_mode = 'streaming_replication'
# Режим работы Pgpool с бэкендами PostgreSQL
# Варианты:
#   - 'streaming_replication': потоковая репликация (ваш случай)
#   - 'raw': нет репликации (один сервер)
#   - 'logical_replication': логическая репликация
#   - 'native_replication': устаревший режим мастер-слейв

# ============================================
# 👥 УПРАВЛЕНИЕ СОЕДИНЕНИЯМИ (ПУЛИНГ)
# ============================================

num_init_children = 32
# Количество дочерних процессов Pgpool (каждый процесс обрабатывает несколько соединений)
# Максимальное общее соединений = num_init_children * max_pool
# Должен быть больше чем сумма max_connections всех PostgreSQL-узлов

max_pool = 4
# Максимум соединений БД на один дочерний процесс (для одного пользователя/базы)
# При достижении лимита, самые старые соединения переиспользуются

reserved_connections = 2
# Резервные соединения для подключений с приоритетом (например, администраторов)
# Защищает от полного исчерпания пула

# ============================================
# 🔐 АУТЕНТИФИКАЦИЯ
# ============================================

enable_pool_hba = on
# Включить файл pool_hba.conf (аналог pg_hba.conf для Pgpool)
# on: Pgpool самостоятельно аутентифицирует клиентов
# off: передаёт аутентификацию PostgreSQL

pool_passwd = '/etc/pgpool2/pool_passwd'
# Путь к файлу с паролями пользователей (захешированными)
# Pgpool сверяет пароли клиентов с этим файлом

allow_clear_text_frontend_auth = off
# Запретить передачу паролей в открытом виде от клиента к Pgpool
# off: только зашифрованные пароли (scram-sha-256, md5)
# on: разрешает plain-text (небезопасно)

# ============================================
# ⚖️ БАЛАНСИРОВКА НАГРУЗКИ
# ============================================

load_balance_mode = on
# Включить балансировку запросов чтения (SELECT) между master и standby
# off: все запросы идут только на master

statement_level_load_balance = on
# Балансировать отдельные операторы внутри одной транзакции
# Включено: SELECT внутри транзакции могут идти на реплики
# Выключено: вся транзакция идёт на один узел

# ============================================
# 🏥 ПРОВЕРКА СОСТОЯНИЯ РЕПЛИКАЦИИ (Streaming Replication Check)
# ============================================

sr_check_period = 5
# Интервал (в секундах) для проверки статуса потоковой репликации
# Pgpool проверяет, что standby синхронизированы с master

sr_check_user = 'postgres'
# Пользователь для подключения к PostgreSQL при проверке репликации

sr_check_password = 'postgres'
# Пароль для sr_check_user

# ============================================
# 💓 HEALTH CHECK (Проверка здоровья бэкендов)
# ============================================

health_check_period = 5
# Интервал (в секундах) между проверками здоровья узлов PostgreSQL
# каждые 5 секунд Pgpool проверяет, жив ли каждый бэкенд

health_check_timeout = 10
# Таймаут (в секундах) для ответа на health check
# Если узел не ответил за 10 секунд - считается сбойным

health_check_user = 'postgres'
# Пользователь для подключения при проверке здоровья

health_check_password = 'postgres'
# Пароль для health_check_user

# ============================================
# 🗄️ ОПИСАНИЕ БЭКЕНДОВ (PostgreSQL узлов)
# ============================================
# Каждый бэкенд имеет индекс 0, 1, 2...
# Формат: backend_XXXYYY, где XXX - параметр, YYY - индекс

backend_hostname0 = 'pg_a'
backend_port0 = 5432
backend_weight0 = 1
backend_data_directory0 = '/var/lib/postgresql/data'
backend_flag0 = 'ALLOW_TO_FAILOVER'
backend_application_name0 = 'pg_a'
# Параметры для pg_a (индекс 0)
# - hostname: имя хоста в Docker сети
# - port: порт PostgreSQL внутри контейнера
# - weight: вес при балансировке (1 = равный, выше = больше запросов)
# - data_directory: путь к PGDATA на узле (для failover)
# - flag: ALLOW_TO_FAILOVER - разрешить отключать узел при ошибке
# - application_name: идентификатор для pg_stat_replication

backend_hostname1 = 'pg_b'
backend_port1 = 5432
backend_weight1 = 1
backend_data_directory1 = '/var/lib/postgresql/data'
backend_flag1 = 'ALLOW_TO_FAILOVER'
backend_application_name1 = 'pg_b'
# Параметры для pg_b (индекс 1)

backend_hostname2 = 'pg_c'
backend_port2 = 5432
backend_weight2 = 1
backend_data_directory2 = '/var/lib/postgresql/data'
backend_flag2 = 'ALLOW_TO_FAILOVER'
backend_application_name2 = 'pg_c'
# Параметры для pg_c (индекс 2)

# ============================================
# 📝 ЛОГИРОВАНИЕ
# ============================================

log_destination = 'stderr'
# Куда писать логи
# 'stderr' - стандартный поток ошибок (лучше для Docker, так как логи попадают в docker logs)
# 'syslog', 'csvlog' - другие варианты

logging_collector = off
# off: не сохранять логи в отдельные файлы (в Docker так правильно)
# on: сохранять логи в файлы (требует места)

# ============================================
# 🔄 FAILOVER (Переключение при сбое)
# ============================================

failover_command = '/usr/local/bin/pgpool-failover.sh %d %P %m %H %M %N'
# Команда, выполняемая при переключении primary
# Переменные (подставляются Pgpool):
#   %d - ID отключенного узла
#   %P - PID старого primary
#   %m - ID нового primary
#   %H - хост нового primary
#   %M - порт нового primary
#   %N - application_name нового primary

failover_on_backend_error = on
# При ошибке бэкенда - инициировать failover (если возможно)

failover_on_backend_shutdown = on
# При штатном завершении бэкенда - инициировать failover

search_primary_node_timeout = 10
# Максимальное время (в секундах) для поиска нового primary после failover
# Если за 10 секунд primary не найден - считать кластер нерабочим