services:
  pg_a:
    build:
      context: .
      dockerfile: images/postgres-repl/Dockerfile
    container_name: lab3_pg_a
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - pg_a_data:/var/lib/postgresql/data
      - ./primary/conf:/etc/postgresql/custom:ro
    ports:
      - "9437:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 5432 -q"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - pgnet

  pg_b:
    build:
      context: .
      dockerfile: images/postgres-repl/Dockerfile
    container_name: lab3_pg_b
    depends_on:
      pg_a:
        condition: service_healthy
    environment:
      PRIMARY_HOST: pg_a
      PRIMARY_PORT: 5432
      REPLICATION_USER: replicator
      REPLICATION_PASSWORD: replicator
      REPLICATION_SLOT: slot_b
      DOWNSTREAM_SLOT: slot_c
      STANDBY_NAME: pg_b
      APPLY_DELAY: 0s
      PGDATA: /var/lib/postgresql/data
    volumes:
      - pg_b_data:/var/lib/postgresql/data
      - ./standby/conf:/etc/postgresql/custom:ro
    entrypoint: ["/usr/local/bin/standby-entrypoint.sh"]
    ports:
      - "9438:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 5432 -q"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - pgnet

  pg_c:
    build:
      context: .
      dockerfile: images/postgres-repl/Dockerfile
    container_name: lab3_pg_c
    depends_on:
      pg_a:
        condition: service_healthy
      pg_b:
        condition: service_healthy
    environment:
      PRIMARY_HOST: pg_b
      PRIMARY_PORT: 5432
      REPLICATION_USER: replicator
      REPLICATION_PASSWORD: replicator
      REPLICATION_SLOT: slot_c
      STANDBY_NAME: pg_c
      APPLY_DELAY: 10s
      PGDATA: /var/lib/postgresql/data
    volumes:
      - pg_c_data:/var/lib/postgresql/data
      - ./standby/conf:/etc/postgresql/custom:ro
    entrypoint: ["/usr/local/bin/standby-entrypoint.sh"]
    ports:
      - "9439:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 5432 -q"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - pgnet

  pgpool:
    build:
      context: .
      dockerfile: images/pgpool/Dockerfile
    container_name: lab3_pgpool
    depends_on:
      pg_a:
        condition: service_healthy
      pg_b:
        condition: service_healthy
      pg_c:
        condition: service_healthy
    ports:
      - "9440:9999"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 9999 -q"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - pgnet

  client:
    image: postgres:16
    container_name: lab3_client
    depends_on:
      pgpool:
        condition: service_healthy
    command: ["sleep", "infinity"]
    volumes:
      - ./scripts:/opt/lab/scripts:ro
    networks:
      - pgnet

volumes:
  pg_a_data:
  pg_b_data:
  pg_c_data:

networks:
  pgnet:
    driver: bridge
