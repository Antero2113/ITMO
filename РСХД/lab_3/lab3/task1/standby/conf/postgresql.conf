listen_addresses = '*'
port = 5432
wal_level = replica
wal_log_hints = on
hot_standby = on
hot_standby_feedback = on
log_connections = on
log_disconnections = on
log_replication_commands = on
max_wal_senders = 10
max_replication_slots = 10
shared_buffers = 256MB
max_connections = 100
password_encryption = 'scram-sha-256'
